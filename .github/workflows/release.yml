name: Compile Executable and Publish Release

on:
  push:
    tags:
      - 'v*' # Triggers automatically when you push a tag starting with 'v' (e.g., v0.2.0)

jobs:
  build-and-release:
    runs-on: windows-latest # PyInstaller must run on Windows to generate a Windows .exe

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install and configure Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.0.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Add Poetry to Path
        run: echo "$Home\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf-8 -Append

      - name: Install Dependencies
        run: poetry install --no-interaction

      - name: Compile Standalone Executable
        run: |
          poetry run pyinstaller --noconsole --onefile --add-data "extract_wiki.py;." gui_app.py

      - name: Create GitHub Release and Upload Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gui_app.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Provided automatically by GitHub Actions