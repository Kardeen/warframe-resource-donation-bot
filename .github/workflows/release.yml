name: Compile Executable and Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install and configure Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.4.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install Core Dependencies
        run: |
          & "$HOME\.local\bin\poetry" install --no-interaction --no-root

      - name: Inject PyInstaller compiler
        run: |
          & "$HOME\.local\bin\poetry" add pyinstaller

      - name: Compile Standalone Executable
        run: |
          & "$HOME\.local\bin\poetry" run pyinstaller --noconsole --onefile --name "ClanVaultManager" --add-data "extract_wiki.py;." gui_app.py

      - name: Create GitHub Release and Upload Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ClanVaultManager.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}